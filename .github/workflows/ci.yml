name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Python 3.8 是项目兼容下限（必跑门禁）
        # 3.11 / 3.12 顺带验证 typing / 关键字变更
        python-version: ["3.8", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install system deps (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # 覆盖率门禁锁在 5 个目标模块 + Config：
          # - JsonStorage / FileManager / UndoManager / TrashManager / SortableTableItem / Config
          # 不锁 core.downloader 是因为 QThread.run() 在子线程内执行，
          # coverage.py 7.x on Python 3.8 无法跟踪子线程的语句覆盖。
          # 不锁 ui/* 是因为 widgets 不在单测范围内，留作后续。
          pytest tests/unit \
            --cov=core.json_storage \
            --cov=core.file_manager \
            --cov=core.undo_manager \
            --cov=core.trash_manager \
            --cov=ui.sortable_item \
            --cov=utils.config \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Run integration tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest tests/integration -v

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7
